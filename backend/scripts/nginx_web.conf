# ── Add this block inside the existing server { } in ashwini-electronics ──
# (alongside the existing /tractormate-api/ block)
#
# TractorMate Web App — Flutter web build served as static files

location /tractormate/ {
    alias /home/ubuntu/tractormate-web/;
    index index.html;
    try_files $uri $uri/ /tractormate/index.html;

    # Cache static assets aggressively, but not index.html
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location = /tractormate/index.html {
        add_header Cache-Control "no-cache";
    }
}

# NOTE: This file is NOT deployed directly.
# The deploy.sh script safely patches the existing nginx config
# (/etc/nginx/sites-available/ashwini-electronics) by inserting the
# location block below into the existing server{} block.
#
# This is here for reference only — showing what gets added.

# ── Add this block inside the existing server { } in ashwini-electronics ──

# TractorMate API - proxied to uvicorn on port 8001
location /tractormate-api/ {
    proxy_pass         http://127.0.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 10M;
}
